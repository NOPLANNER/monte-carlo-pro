<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Ultimate</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e5e7eb; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .config { background: #2d2d2d; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row div { flex: 1; }
        label { display: block; font-size: 0.75rem; color: #9ca3af; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; background: #3d3d3d; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; }
        .main-display { text-align: center; padding: 20px; border: 2px solid #333; border-radius: 12px; margin-bottom: 20px; }
        .bet-amt { font-size: 2.2rem; font-weight: bold; color: #3b82f6; margin: 10px 0; }
        .seq-text { font-family: monospace; font-size: 1.4rem; background: #000; padding: 12px; border-radius: 8px; letter-spacing: 3px; }
        .profit { text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #fff; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .btn-win { background: #10b981; }
        .btn-loss { background: #ef4444; }
        .btn-undo { background: #4b5563; grid-column: span 2; }
        .btn-reset { background: transparent; color: #9ca3af; border: 1px solid #444; grid-column: span 2; margin-top: 10px; padding: 10px; font-size: 0.8rem; }
        .history { margin-top: 20px; border-top: 1px solid #333; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d2d2d; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#3b82f6; margin-top:0;">MONTE CARLO</h2>

    <div class="config">
        <div class="row">
            <div>
                <label>配当モード</label>
                <select id="payout" onchange="updateView()">
                    <option value="3">3倍</option>
                    <option value="2">2倍</option>
                </select>
            </div>
            <div>
                <label>割合 (%)</label>
                <select id="percent" onchange="updateView()">
                    <option value="0.1">0.1</option>
                    <option value="0.5" selected>0.5</option>
                    <option value="1">1.0</option>
                </select>
            </div>
        </div>
        <label>軍資金 (円)</label>
        <input type="number" id="capital" value="100000" oninput="updateView()">
    </div>

    <div id="profit" class="profit">損益: ¥0</div>

    <div class="main-display">
        <label>NEXT BET</label>
        <div id="betDisplay" class="bet-amt">¥0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history"></div>
</div>

<script>
    // グローバル変数として定義
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];

    // ベット額計算
    function getBetValue() {
        var cap = parseFloat(document.getElementById('capital').value) || 0;
        var per = parseFloat(document.getElementById('percent').value) || 0.5;
        var unit = Math.floor(cap * (per / 100));
        
        var units = 0;
        if (sequence.length >= 2) {
            units = sequence[0] + sequence[sequence.length - 1];
        } else if (sequence.length === 1) {
            units = sequence[0];
        }
        return units * unit;
    }

    // 画面更新
    function updateView() {
        var betAmt = getBetValue();
        document.getElementById('betDisplay').innerText = "¥" + betAmt.toLocaleString();
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        
        var pEl = document.getElementById('profit');
        pEl.innerText = "累計損益: ¥" + totalProfit.toLocaleString();
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        var logHtml = "";
        for (var i = 0; i < historyData.length; i++) {
            var h = historyData[i];
            logHtml += '<div class="history-item">' +
                '<span style="color:' + (h.res === "W" ? "#10b981" : "#ef4444") + '">' + (h.res === "W" ? "WIN" : "LOSS") + '</span>' +
                '<span>' + h.amt.toLocaleString() + '円</span>' +
                '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;
    }

    // 勝利時の処理
    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        
        totalProfit += (currentBet * (payout - 1));
        var removeNum = (payout === 3) ? 2 : 1;
        sequence = sequence.slice(removeNum, -removeNum);
        
        historyData.unshift({ res: 'W', amt: currentBet });
        if (historyData.length > 10) historyData.pop();
        
        checkFinish();
        updateView();
    }

    // 敗北時の処理
    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        
        totalProfit -= currentBet;
        sequence.push(units);
        
        historyData.unshift({ res: 'L', amt: currentBet });
        if (historyData.length > 10) historyData.pop();
        
        updateView();
    }

    // Undo
    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    // Reset
    function handleReset() {
        if (confirm("リセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: JSON.parse(JSON.stringify(sequence)),
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    function checkFinish() {
        if (sequence.length <= 1) {
            alert("目標達成！リセットします。");
            sequence = [1, 2, 3];
        }
    }

    // 起動時に実行
    updateView();
</script>
</body>
</html>
