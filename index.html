<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Pro - Risk Color</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #3b82f6;
            --win: #10b981;
            --loss: #ef4444;
            --sub: #9ca3af;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            padding: 5px; /* 余白を最小化 */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; /* 上部の余白を削除 */
            background: var(--card); 
            padding: 10px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px;
        }
        
        .config { 
            background: #2d2d2d; 
            padding: 8px; 
            border-radius: 8px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            font-size: 0.75rem; 
        }
        input, select { 
            width: 100%; 
            padding: 6px; 
            background: #3d3d3d; 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            outline: none;
        }
        label { color: var(--sub); margin-bottom: 2px; display: block; }

        .profit-bar { text-align: center; font-weight: bold; font-size: 1rem; margin: 2px 0; }

        .display { 
            text-align: center; 
            padding: 10px; 
            border: 1.5px solid #333; 
            border-radius: 10px; 
            background: #181818; 
        }
        .bet-label { font-size: 0.7rem; color: var(--sub); }
        .bet-amt { font-size: 2.8rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
        .seq-text { 
            font-family: monospace; 
            font-size: 1.1rem; 
            background: #000; 
            padding: 6px; 
            border-radius: 6px; 
            letter-spacing: 2px; 
            color: #fff; 
            overflow-x: auto; 
            white-space: nowrap; 
            margin-top: 4px;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { 
            padding: 16px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: #fff; 
            touch-action: manipulation;
        }
        button:active { opacity: 0.6; transform: scale(0.98); }
        .btn-win { background: var(--win); }
        .btn-loss { background: var(--loss); }
        .btn-undo { background: #4b5563; font-size: 0.9rem; padding: 12px; }
        .btn-reset { background: transparent; color: #444; border: 1px solid #333; font-size: 0.7rem; padding: 6px; }

        .history-compact { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 4px; 
            justify-content: center; 
            min-height: 25px; 
            margin-top: 5px;
        }
        .chip { 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.65rem; 
            font-weight: bold; 
            min-width: 24px; 
            text-align: center; 
        }
        .chip-w { color: var(--win); border: 1px solid var(--win); background: rgba(16, 185, 129, 0.1); }
        .chip-l { color: var(--loss); border: 1px solid var(--loss); background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="config">
        <div style="grid-column: span 2;">
            <label>軍資金 / ターゲット</label>
            <input type="number" id="capital" value="100000" oninput="updateView()">
        </div>
        <div>
            <label>配当</label>
            <select id="payout" onchange="updateView()">
                <option value="3">3倍</option>
                <option value="2">2倍</option>
            </select>
        </div>
        <div>
            <label>割合 (リスク)</label>
            <select id="percent" onchange="updateView()"></select>
        </div>
    </div>

    <div id="profit" class="profit-bar">損益: 0</div>

    <div class="display">
        <div class="bet-label">NEXT BET</div>
        <div id="betDisplay" class="bet-amt">0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history-compact"></div>
</div>

<script>
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];

    function createPercentOptions() {
        var sel = document.getElementById('percent');
        var colors = ["#3b82f6", "#60a5fa", "#93c5fd", "#4ade80", "#22c55e", "#16a34a", "#fca5a5", "#f87171", "#ef4444", "#dc2626"];
        
        for (var i = 1; i <= 10; i++) {
            var val = (i / 10).toFixed(1);
            var opt = document.createElement('option');
            opt.value = val;
            
            var label = "";
            if (val == "0.1") label = " (Low)";
            if (val == "0.5") label = " (Middle)";
            if (val == "1.0") label = " (High)";
            
            opt.text = val + "%" + label;
            opt.style.color = colors[i-1]; // リスクに応じて色分け（ブラウザにより反映されない場合あり）
            
            if (val == "0.5") opt.selected = true;
            sel.appendChild(opt);
        }
    }

    // 選択されたリスクに応じてセレクトボックス自体の色を変える
    function updatePercentColor() {
        var sel = document.getElementById('percent');
        var val = parseFloat(sel.value);
        if (val <= 0.3) sel.style.color = "#60a5fa"; // Blue
        else if (val <= 0.6) sel.style.color = "#22c55e"; // Green
        else sel.style.color = "#ef4444"; // Red
    }

    function getBetValue() {
        var cap = parseFloat(document.getElementById('capital').value) || 0;
        var per = parseFloat(document.getElementById('percent').value) || 0.5;
        var unit = Math.floor(cap * (per / 100));
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : (sequence[0] || 0);
        return units * unit;
    }

    function updateView() {
        updatePercentColor();
        var betAmt = getBetValue();
        document.getElementById('betDisplay').innerText = betAmt.toLocaleString();
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        
        var pEl = document.getElementById('profit');
        pEl.innerText = "損益: " + totalProfit.toLocaleString();
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        var logHtml = "";
        for (var i = 0; i < Math.min(historyData.length, 16); i++) {
            var h = historyData[i];
            logHtml += '<div class="chip ' + (h.res === "W" ? "chip-w" : "chip-l") + '">' + h.res + '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;
    }

    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        totalProfit += (currentBet * (payout - 1));
        sequence = sequence.slice((payout === 3 ? 2 : 1), (payout === 3 ? -2 : -1));
        historyData.unshift({ res: 'W', amt: currentBet });
        if (sequence.length <= 1) { alert("目標達成！"); sequence = [1, 2, 3]; }
        updateView();
    }

    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        totalProfit -= currentBet;
        sequence.push(units);
        historyData.unshift({ res: 'L', amt: currentBet });
        updateView();
    }

    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    function handleReset() {
        if (confirm("リセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: JSON.parse(JSON.stringify(sequence)),
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    createPercentOptions();
    updateView();
</script>
</body>
</html>
