<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Pro - Risk Label Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #3b82f6;
            --win: #10b981;
            --loss: #ef4444;
            --sub: #9ca3af;
        }
        html, body { 
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            touch-action: none;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            box-sizing: border-box;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            background: var(--card); 
            padding: 14px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            box-sizing: border-box;
        }
        
        .config { 
            background: #2d2d2d; 
            padding: 10px; 
            border-radius: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        .config-item { display: flex; flex-direction: column; }
        .input-group { display: flex; gap: 4px; }
        .currency-select { width: 55px; flex-shrink: 0; padding: 8px 2px; }

        input, select { 
            width: 100%; padding: 8px; background: #3d3d3d; border: 2px solid #444; 
            color: #fff; border-radius: 6px; font-size: 0.9rem; font-weight: bold; outline: none; box-sizing: border-box;
        }
        label { color: var(--sub); font-size: 0.65rem; margin-bottom: 2px; display: block; text-transform: uppercase; }

        .status-val { font-weight: bold; font-size: 0.85rem; padding: 5px 0; }
        .risk-low { color: #60a5fa; }
        .risk-mid { color: #10b981; }
        .risk-high { color: #ef4444; }

        .summary-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; width: 100%; box-sizing: border-box; }
        .summary-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .summary-label { font-size: 0.6rem; color: var(--sub); }
        .summary-value { font-weight: bold; font-size: 1.05rem; }

        .display { text-align: center; padding: 10px; border: 2px solid #333; border-radius: 12px; background: #181818; width: 100%; box-sizing: border-box; }
        .bet-label { font-size: 0.7rem; color: var(--sub); letter-spacing: 1px; }
        .bet-amt { font-size: 3rem; font-weight: 900; color: var(--primary); line-height: 1.1; margin: 2px 0; }
        .seq-text { font-family: monospace; font-size: 1.2rem; background: #000; padding: 8px; border-radius: 8px; letter-spacing: 2px; color: #fff; overflow-x: auto; white-space: nowrap; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; box-sizing: border-box; }
        button { padding: 15px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: #fff; touch-action: manipulation; }
        button:active { opacity: 0.6; transform: scale(0.96); }
        .btn-win { background: var(--win); box-shadow: 0 4px 0 #059669; }
        .btn-loss { background: var(--loss); box-shadow: 0 4px 0 #dc2626; }
        .btn-undo { background: #4b5563; font-size: 0.9rem; padding: 10px; }
        .btn-reset { background: transparent; color: #444; border: 1px solid #333; font-size: 0.7rem; padding: 10px; }

        .history-compact { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 5px; width: 100%; box-sizing: border-box; }
        .chip { padding: 4px 0; border-radius: 4px; font-size: 0.6rem; font-weight: bold; text-align: center; border: 1.5px solid transparent; }
        .chip-w { color: var(--win); border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.1); }
        .chip-l { color: var(--loss); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
        .chip-latest { border-color: #ffffff !important; box-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .chart-container {
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            background: var(--card);
            border-radius: 16px;
            padding: 10px 15px 10px 5px; 
            box-sizing: border-box;
            flex-grow: 1; 
            min-height: 150px;
        }

        #goalOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #goalToast {
            background: rgba(16, 185, 129, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid white;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="goalOverlay" onclick="hideGoalToast()">
    <div id="goalToast">目標達成！</div>
</div>

<div class="container">
    <div class="config">
        <div class="config-item">
            <label>通貨 / スタート資金</label>
            <div class="input-group">
                <select id="currency" class="currency-select" onchange="updateView()">
                    <option value="¥">¥</option>
                    <option value="$">$</option>
                </select>
                <input type="number" id="startCapital" value="100000" oninput="updateView()">
            </div>
        </div>
        <div class="config-item">
            <label>ベット額 (1単位)</label>
            <input type="number" id="baseBet" value="100" oninput="updateView()">
        </div>
        <div class="config-item">
            <label>配当</label>
            <select id="payout" onchange="updateView()">
                <option value="3">3倍</option>
                <option value="2" selected>2倍</option>
            </select>
        </div>
        <div class="config-item">
            <label>リスク分析</label>
            <div id="riskDisplay" class="status-val">--</div>
        </div>
    </div>

    <div class="summary-bar">
        <div class="summary-item">
            <span class="summary-label">現在の資金</span>
            <span id="currentFunds" class="summary-value" style="color: #fff;">0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">損益</span>
            <span id="profit" class="summary-value" style="color: #10b981;">0</span>
        </div>
    </div>

    <div class="display">
        <div class="bet-label">NEXT BET</div>
        <div id="betDisplay" class="bet-amt">0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history-compact"></div>
</div>

<div class="chart-container">
    <canvas id="balanceChart"></canvas>
</div>

<script>
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];
    var myChart = null;
    var toastTimer = null;

    function showGoalToast() {
        const overlay = document.getElementById('goalOverlay');
        overlay.style.display = 'flex';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(hideGoalToast, 3000);
    }

    function hideGoalToast() {
        const overlay = document.getElementById('goalOverlay');
        overlay.style.display = 'none';
        if (toastTimer) clearTimeout(toastTimer);
    }

    function initChart() {
        const ctx = document.getElementById('balanceChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['0'], 
                datasets: [
                    {
                        label: '資金推移',
                        data: [0],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: '損益',
                        data: [0],
                        borderColor: '#10b981',
                        borderWidth: 1.5,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { right: 10 } },
                scales: {
                    x: { 
                        display: true, 
                        title: { display: true, text: '取引回数', color: '#666', font: { size: 10 } },
                        grid: { display: false },
                        ticks: { color: '#666', font: { size: 9 }, maxRotation: 0 }
                    },
                    y: { 
                        position: 'left',
                        grid: { color: '#252525' },
                        ticks: { color: '#9ca3af', font: { size: 9 } }
                    },
                    y1: { 
                        position: 'right',
                        grid: { display: false },
                        ticks: { color: '#10b981', font: { size: 9 }, padding: 5 }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function formatCurrency(val) {
        var cur = document.getElementById('currency').value;
        return cur + Math.floor(val).toLocaleString();
    }

    function updateView() {
        var startCap = parseFloat(document.getElementById('startCapital').value) || 0;
        var betAmt = getBetValue();
        var currentFunds = startCap + totalProfit;
        
        document.getElementById('betDisplay').innerText = formatCurrency(betAmt);
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        document.getElementById('currentFunds').innerText = formatCurrency(currentFunds);
        
        var pEl = document.getElementById('profit');
        pEl.innerText = (totalProfit >= 0 ? "+" : "") + formatCurrency(totalProfit);
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        var riskPercent = currentFunds > 0 ? (betAmt / currentFunds) * 100 : 0;
        var riskEl = document.getElementById('riskDisplay');
        riskEl.className = "status-val";
        
        // リスクラベルの判定
        var riskLabel = "";
        if (riskPercent <= 1.0) {
            riskEl.classList.add('risk-low');
            riskLabel = "[LOW]";
        } else if (riskPercent <= 3.0) {
            riskEl.classList.add('risk-mid');
            riskLabel = "[MID]";
        } else {
            riskEl.classList.add('risk-high');
            riskLabel = "[HI]";
        }
        riskEl.innerText = riskPercent.toFixed(1) + "% " + riskLabel;

        var logHtml = "";
        var displayHistory = historyData.slice(-10).reverse();
        for (var i = 0; i < displayHistory.length; i++) {
            var h = displayHistory[i];
            var latestClass = (i === 0) ? " chip-latest" : "";
            logHtml += '<div class="chip ' + (h.res === "W" ? "chip-w" : "chip-l") + latestClass + '">' + h.res + '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;

        updateChart(startCap);
    }

    function updateChart(startCap) {
        if (!myChart) return;
        let labels = ['0'];
        let fundsData = [startCap];
        let profitData = [0];
        let runningProfit = 0;

        historyData.forEach((h, index) => {
            labels.push((index + 1).toString());
            runningProfit += h.pChange;
            fundsData.push(startCap + runningProfit);
            profitData.push(runningProfit);
        });

        myChart.data.labels = labels;
        myChart.data.datasets[0].data = fundsData;
        myChart.data.datasets[1].data = profitData;
        myChart.data.datasets[1].borderColor = runningProfit >= 0 ? '#10b981' : '#ef4444';
        myChart.update('none');
    }

    function getBetValue() {
        var base = parseFloat(document.getElementById('baseBet').value) || 0;
        var cur = document.getElementById('currency').value;
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : (sequence[0] || 0);
        var rawBet = units * base;
        return (cur === "¥") ? Math.round(rawBet / 100) * 100 : rawBet;
    }

    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        var pChange = (currentBet * (payout - 1));
        totalProfit += pChange;
        sequence = sequence.slice((payout === 3 ? 2 : 1), (payout === 3 ? -2 : -1));
        historyData.push({ res: 'W', pChange: pChange });
        if (sequence.length <= 1) { 
            showGoalToast();
            sequence = [1, 2, 3]; 
        }
        updateView();
    }

    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var pChange = -currentBet;
        totalProfit += pChange;
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        sequence.push(units);
        historyData.push({ res: 'L', pChange: pChange });
        updateView();
    }

    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    function handleReset() {
        if (confirm("全履歴をリセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: [...sequence],
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    initChart();
    updateView();
</script>
</body>
</html>
