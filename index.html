<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Pro - Currency Edition</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #3b82f6;
            --win: #10b981;
            --loss: #ef4444;
            --sub: #9ca3af;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            padding: 15px 12px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            background: var(--card); 
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .config { 
            background: #2d2d2d; 
            padding: 12px; 
            border-radius: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .config-item { display: flex; flex-direction: column; }
        
        /* 通貨と資金を横並びにするためのスタイル */
        .input-group { display: flex; gap: 4px; }
        .currency-select { width: 60px; flex-shrink: 0; padding: 10px 5px; text-align: center; }

        input, select { 
            width: 100%; 
            padding: 10px; 
            background: #3d3d3d; 
            border: 2px solid #444; 
            color: #fff; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
        }
        label { color: var(--sub); font-size: 0.7rem; margin-bottom: 4px; display: block; text-transform: uppercase; }

        .status-val {
            font-weight: bold;
            font-size: 0.95rem;
            padding: 10px 0;
        }
        .risk-low { color: #60a5fa; }
        .risk-mid { color: #10b981; }
        .risk-high { color: #ef4444; }

        .summary-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 5px;
            margin: 2px 0;
        }
        .summary-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .summary-label { font-size: 0.65rem; color: var(--sub); margin-bottom: 2px; }
        .summary-value { font-weight: bold; font-size: 1.1rem; }

        .display { 
            text-align: center; 
            padding: 15px; 
            border: 2px solid #333; 
            border-radius: 12px; 
            background: #181818; 
        }
        .bet-label { font-size: 0.75rem; color: var(--sub); letter-spacing: 1px; }
        .bet-amt { font-size: 3.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; margin: 4px 0; }
        .seq-text { 
            font-family: monospace; 
            font-size: 1.3rem; 
            background: #000; 
            padding: 10px; 
            border-radius: 8px; 
            letter-spacing: 3px; 
            color: #fff; 
            overflow-x: auto; 
            white-space: nowrap; 
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        button { 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: #fff; 
            touch-action: manipulation;
        }
        button:active { opacity: 0.6; transform: scale(0.96); }
        .btn-win { background: var(--win); box-shadow: 0 4px 0 #059669; }
        .btn-loss { background: var(--loss); box-shadow: 0 4px 0 #dc2626; }
        .btn-undo { background: #4b5563; font-size: 1rem; padding: 12px; }
        .btn-reset { background: transparent; color: #444; border: 1px solid #333; font-size: 0.75rem; padding: 12px; }

        .history-compact { 
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px; 
            margin-top: 10px;
        }
        .chip { 
            padding: 4px 0; 
            border-radius: 4px; 
            font-size: 0.65rem; 
            font-weight: bold; 
            text-align: center; 
            border: 1.5px solid transparent;
        }
        .chip-w { color: var(--win); border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.1); }
        .chip-l { color: var(--loss); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
        .chip-latest { border-color: #ffffff !important; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div class="config">
        <div class="config-item" style="grid-column: span 1;">
            <label>通貨 / スタート資金</label>
            <div class="input-group">
                <select id="currency" class="currency-select" onchange="updateView()">
                    <option value="¥">¥</option>
                    <option value="$">$</option>
                </select>
                <input type="number" id="startCapital" value="100000" oninput="updateView()">
            </div>
        </div>
        <div class="config-item">
            <label>ベット額 (1単位)</label>
            <input type="number" id="baseBet" value="100" oninput="updateView()">
        </div>
        <div class="config-item">
            <label>配当</label>
            <select id="payout" onchange="updateView()">
                <option value="3">3倍</option>
                <option value="2">2倍</option>
            </select>
        </div>
        <div class="config-item">
            <label>リスク分析</label>
            <div id="riskDisplay" class="status-val">--</div>
        </div>
    </div>

    <div class="summary-bar">
        <div class="summary-item">
            <span class="summary-label">現在の資金</span>
            <span id="currentFunds" class="summary-value" style="color: #fff;">0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">損益</span>
            <span id="profit" class="summary-value" style="color: #10b981;">0</span>
        </div>
    </div>

    <div class="display">
        <div class="bet-label">NEXT BET</div>
        <div id="betDisplay" class="bet-amt">0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history-compact"></div>
</div>

<script>
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];

    function formatCurrency(val) {
        var cur = document.getElementById('currency').value;
        return cur + val.toLocaleString();
    }

    function updateStatusUI(currentBet) {
        var startCap = parseFloat(document.getElementById('startCapital').value) || 0;
        var currentFunds = startCap + totalProfit;
        document.getElementById('currentFunds').innerText = formatCurrency(currentFunds);
        
        var riskPercent = currentFunds > 0 ? (currentBet / currentFunds) * 100 : 0;
        var riskEl = document.getElementById('riskDisplay');
        riskEl.className = "status-val";
        var level = "";
        if (riskPercent <= 1.0) { level = "Low"; riskEl.classList.add('risk-low'); }
        else if (riskPercent <= 3.0) { level = "Middle"; riskEl.classList.add('risk-mid'); }
        else { level = "High"; riskEl.classList.add('risk-high'); }
        riskEl.innerText = riskPercent.toFixed(1) + "% (" + level + ")";
    }

    function getBetValue() {
        var base = parseFloat(document.getElementById('baseBet').value) || 0;
        var cur = document.getElementById('currency').value;
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : (sequence[0] || 0);
        var rawBet = units * base;

        // 円(¥)の場合のみ、10の位を四捨五入して100円単位にする
        if (cur === "¥") {
            return Math.round(rawBet / 100) * 100;
        }
        return rawBet;
    }

    function updateView() {
        var betAmt = getBetValue();
        var cur = document.getElementById('currency').value;
        
        document.getElementById('betDisplay').innerText = formatCurrency(betAmt);
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        
        var pEl = document.getElementById('profit');
        pEl.innerText = (totalProfit >= 0 ? "+" : "") + formatCurrency(totalProfit);
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        updateStatusUI(betAmt);

        var logHtml = "";
        var displayHistory = historyData.slice(0, 10);
        for (var i = 0; i < displayHistory.length; i++) {
            var h = displayHistory[i];
            var latestClass = (i === 0) ? " chip-latest" : "";
            logHtml += '<div class="chip ' + (h.res === "W" ? "chip-w" : "chip-l") + latestClass + '">' + h.res + '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;
    }

    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        totalProfit += (currentBet * (payout - 1));
        sequence = sequence.slice((payout === 3 ? 2 : 1), (payout === 3 ? -2 : -1));
        historyData.unshift({ res: 'W' });
        if (sequence.length <= 1) { alert("目標達成！"); sequence = [1, 2, 3]; }
        updateView();
    }

    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        totalProfit -= currentBet;
        sequence.push(units);
        historyData.unshift({ res: 'L' });
        updateView();
    }

    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    function handleReset() {
        if (confirm("リセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: JSON.parse(JSON.stringify(sequence)),
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    updateView();
</script>
</body>
</html>
