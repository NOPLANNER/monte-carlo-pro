<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Pro - Refined</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #3b82f6;
            --win: #10b981;
            --loss: #ef4444;
            --sub: #9ca3af;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            padding: 20px 12px; /* 上部に適度な余白を追加 */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            background: var(--card); 
            padding: 18px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; /* パーツ間の間隔を広げた */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .config { 
            background: #2d2d2d; 
            padding: 12px; 
            border-radius: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            font-size: 0.8rem; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            background: #3d3d3d; 
            border: 2px solid #444; 
            color: #fff; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        label { color: var(--sub); margin-bottom: 4px; display: block; }

        /* リスク別の枠色設定 */
        .risk-low { border-color: #3b82f6 !important; color: #60a5fa !important; }
        .risk-mid { border-color: #10b981 !important; color: #10b981 !important; }
        .risk-high { border-color: #ef4444 !important; color: #ef4444 !important; }

        .profit-bar { text-align: center; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }

        .display { 
            text-align: center; 
            padding: 15px; 
            border: 2px solid #333; 
            border-radius: 12px; 
            background: #181818; 
        }
        .bet-label { font-size: 0.8rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
        .bet-amt { font-size: 3.2rem; font-weight: 900; color: var(--primary); line-height: 1.1; margin: 5px 0; }
        .seq-text { 
            font-family: monospace; 
            font-size: 1.3rem; 
            background: #000; 
            padding: 10px; 
            border-radius: 8px; 
            letter-spacing: 3px; 
            color: #fff; 
            overflow-x: auto; 
            white-space: nowrap; 
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        button { 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: #fff; 
            touch-action: manipulation;
        }
        button:active { opacity: 0.6; transform: scale(0.96); }
        .btn-win { background: var(--win); box-shadow: 0 4px 0 #059669; }
        .btn-loss { background: var(--loss); box-shadow: 0 4px 0 #dc2626; }
        .btn-undo { background: #4b5563; font-size: 1rem; padding: 12px; grid-column: span 1; }
        .btn-reset { background: transparent; color: #555; border: 1px solid #333; font-size: 0.8rem; padding: 12px; }

        .history-compact { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 5px; 
            justify-content: center; 
            margin-top: 10px;
            min-height: 30px;
        }
        .chip { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            min-width: 28px; 
            text-align: center; 
        }
        .chip-w { color: var(--win); border: 1.5px solid var(--win); background: rgba(16, 185, 129, 0.1); }
        .chip-l { color: var(--loss); border: 1.5px solid var(--loss); background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="config">
        <div style="grid-column: span 2;">
            <label>軍資金 / ターゲット</label>
            <input type="number" id="capital" value="100000" oninput="updateView()">
        </div>
        <div>
            <label>配当</label>
            <select id="payout" onchange="updateView()">
                <option value="3">3倍</option>
                <option value="2">2倍</option>
            </select>
        </div>
        <div>
            <label>割合 (リスク)</label>
            <select id="percent" onchange="updateView()"></select>
        </div>
    </div>

    <div id="profit" class="profit-bar">損益: 0</div>

    <div class="display">
        <div class="bet-label">NEXT BET</div>
        <div id="betDisplay" class="bet-amt">0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history-compact"></div>
</div>

<script>
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];

    function createPercentOptions() {
        var sel = document.getElementById('percent');
        for (var i = 1; i <= 10; i++) {
            var val = (i / 10).toFixed(1);
            var opt = document.createElement('option');
            opt.value = val;
            
            var riskLabel = "";
            if (val == "0.1") riskLabel = " Low";
            if (val == "0.5") riskLabel = " Middle";
            if (val == "1.0") riskLabel = " High";
            
            opt.text = val + "%" + riskLabel;
            if (val == "0.5") opt.selected = true;
            sel.appendChild(opt);
        }
    }

    function updateRiskUI() {
        var sel = document.getElementById('percent');
        var val = parseFloat(sel.value);
        sel.classList.remove('risk-low', 'risk-mid', 'risk-high');
        if (val <= 0.3) sel.classList.add('risk-low');
        else if (val <= 0.6) sel.classList.add('risk-mid');
        else sel.classList.add('risk-high');
    }

    function getBetValue() {
        var cap = parseFloat(document.getElementById('capital').value) || 0;
        var per = parseFloat(document.getElementById('percent').value) || 0.5;
        var unit = Math.floor(cap * (per / 100));
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : (sequence[0] || 0);
        return units * unit;
    }

    function updateView() {
        updateRiskUI();
        var betAmt = getBetValue();
        document.getElementById('betDisplay').innerText = betAmt.toLocaleString();
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        
        var pEl = document.getElementById('profit');
        pEl.innerText = "損益: " + totalProfit.toLocaleString();
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        var logHtml = "";
        for (var i = 0; i < Math.min(historyData.length, 12); i++) {
            var h = historyData[i];
            logHtml += '<div class="chip ' + (h.res === "W" ? "chip-w" : "chip-l") + '">' + h.res + '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;
    }

    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        totalProfit += (currentBet * (payout - 1));
        sequence = sequence.slice((payout === 3 ? 2 : 1), (payout === 3 ? -2 : -1));
        historyData.unshift({ res: 'W', amt: currentBet });
        if (sequence.length <= 1) { alert("目標達成！"); sequence = [1, 2, 3]; }
        updateView();
    }

    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        totalProfit -= currentBet;
        sequence.push(units);
        historyData.unshift({ res: 'L', amt: currentBet });
        updateView();
    }

    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    function handleReset() {
        if (confirm("リセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: JSON.parse(JSON.stringify(sequence)),
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    createPercentOptions();
    updateView();
</script>
</body>
</html>
