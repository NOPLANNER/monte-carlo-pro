<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monte Carlo Compact</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e5e7eb; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { width: 100%; max-width: 400px; margin: auto; background: #1e1e1e; padding: 15px; border-radius: 12px; box-sizing: border-box; }
        
        /* 設定エリアをコンパクトに */
        .config { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8rem; }
        input, select { width: 100%; padding: 6px; background: #3d3d3d; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 0.9rem; }
        label { color: #9ca3af; margin-bottom: 2px; display: block; }

        .profit-bar { text-align: center; font-weight: bold; margin-bottom: 8px; font-size: 1rem; }

        /* メイン表示 */
        .display { text-align: center; padding: 15px; border: 2px solid #333; border-radius: 10px; margin-bottom: 10px; background: #181818; }
        .bet-amt { font-size: 2.5rem; font-weight: 900; color: #3b82f6; margin: 2px 0; }
        .seq-text { font-family: monospace; font-size: 1.2rem; background: #000; padding: 8px; border-radius: 6px; letter-spacing: 2px; color: #fff; overflow-x: auto; white-space: nowrap; }

        /* ボタン */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #fff; }
        button:active { opacity: 0.7; }
        .btn-win { background: #10b981; }
        .btn-loss { background: #ef4444; }
        .btn-undo { background: #4b5563; padding: 10px; font-size: 0.9rem; }
        .btn-reset { background: transparent; color: #666; border: 1px solid #333; padding: 6px; font-size: 0.7rem; }

        /* 横並び履歴 */
        .history-compact { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 40px; }
        .chip { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; min-width: 30px; text-align: center; }
        .chip-w { background: #10b98122; color: #10b981; border: 1px solid #10b981; }
        .chip-l { background: #ef444422; color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <div class="config">
        <div style="grid-column: span 2;">
            <label>軍資金 (円)</label>
            <input type="number" id="capital" value="100000" oninput="updateView()">
        </div>
        <div>
            <label>配当</label>
            <select id="payout" onchange="updateView()">
                <option value="3">3倍</option>
                <option value="2">2倍</option>
            </select>
        </div>
        <div>
            <label>割合(%)</label>
            <select id="percent" onchange="updateView()">
                <option value="0.1">0.1</option>
                <option value="0.5" selected>0.5</option>
                <option value="1">1.0</option>
            </select>
        </div>
    </div>

    <div id="profit" class="profit-bar">損益: ¥0</div>

    <div class="display">
        <div style="font-size:0.75rem; color:#9ca3af;">NEXT BET</div>
        <div id="betDisplay" class="bet-amt">¥0</div>
        <div id="seqDisplay" class="seq-text">1 2 3</div>
    </div>

    <div class="btn-grid">
        <button type="button" class="btn-win" onclick="handleWin()">WIN</button>
        <button type="button" class="btn-loss" onclick="handleLoss()">LOSS</button>
        <button type="button" class="btn-undo" onclick="handleUndo()">UNDO</button>
        <button type="button" class="btn-reset" onclick="handleReset()">RESET</button>
    </div>

    <div id="historyLog" class="history-compact">
        </div>
</div>

<script>
    var sequence = [1, 2, 3];
    var historyData = [];
    var totalProfit = 0;
    var undoStack = [];

    function getBetValue() {
        var cap = parseFloat(document.getElementById('capital').value) || 0;
        var per = parseFloat(document.getElementById('percent').value) || 0.5;
        var unit = Math.floor(cap * (per / 100));
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : (sequence[0] || 0);
        return units * unit;
    }

    function updateView() {
        var betAmt = getBetValue();
        document.getElementById('betDisplay').innerText = "¥" + betAmt.toLocaleString();
        document.getElementById('seqDisplay').innerText = sequence.join(' ');
        
        var pEl = document.getElementById('profit');
        pEl.innerText = "損益: ¥" + totalProfit.toLocaleString();
        pEl.style.color = totalProfit >= 0 ? "#10b981" : "#ef4444";

        var logHtml = "";
        // 直近12回分を表示（横並び）
        for (var i = 0; i < Math.min(historyData.length, 12); i++) {
            var h = historyData[i];
            var typeClass = (h.res === "W" ? "chip-w" : "chip-l");
            logHtml += '<div class="chip ' + typeClass + '">' + h.res + '</div>';
        }
        document.getElementById('historyLog').innerHTML = logHtml;
    }

    function handleWin() {
        saveState();
        var currentBet = getBetValue();
        var payout = parseInt(document.getElementById('payout').value);
        totalProfit += (currentBet * (payout - 1));
        sequence = sequence.slice((payout === 3 ? 2 : 1), (payout === 3 ? -2 : -1));
        historyData.unshift({ res: 'W', amt: currentBet });
        checkFinish();
        updateView();
    }

    function handleLoss() {
        saveState();
        var currentBet = getBetValue();
        var units = (sequence.length >= 2) ? (sequence[0] + sequence[sequence.length - 1]) : sequence[0];
        totalProfit -= currentBet;
        sequence.push(units);
        historyData.unshift({ res: 'L', amt: currentBet });
        updateView();
    }

    function handleUndo() {
        if (undoStack.length > 0) {
            var prev = undoStack.pop();
            sequence = prev.sequence;
            totalProfit = prev.totalProfit;
            historyData = prev.historyData;
            updateView();
        }
    }

    function handleReset() {
        if (confirm("リセットしますか？")) {
            sequence = [1, 2, 3];
            historyData = [];
            totalProfit = 0;
            undoStack = [];
            updateView();
        }
    }

    function saveState() {
        undoStack.push({
            sequence: JSON.parse(JSON.stringify(sequence)),
            totalProfit: totalProfit,
            historyData: JSON.parse(JSON.stringify(historyData))
        });
    }

    function checkFinish() {
        if (sequence.length <= 1) {
            alert("目標達成！");
            sequence = [1, 2, 3];
        }
    }

    updateView();
</script>
</body>
</html>
